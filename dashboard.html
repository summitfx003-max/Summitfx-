<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    position:relative;
    z-index:1000;
}

.logo {
    font-size:20px;
    font-weight:bold;
    background: linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.menu-btn {
    font-size:22px;
    cursor:pointer;
}

.dropdown {
    display:none;
    position:fixed;
    top:70px;
    right:15px;
    background:#111827;
    border-radius:10px;
    overflow:hidden;
    z-index:99999;
    box-shadow:0 5px 20px rgba(0,0,0,0.7);
}

.dropdown div {
    padding:12px 20px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.dropdown div:hover {
    background:#1f2937;
    color:#00ffcc;
}

.ticker {
    background:#111827;
    padding:10px;
    overflow:hidden;
    white-space:nowrap;
    border-top:1px solid #222;
    border-bottom:1px solid #222;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    margin:15px;
    padding:20px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.08);
}

.title {
    color:#aaa;
    font-size:14px;
}

.big {
    font-size:28px;
    margin-top:5px;
}

.green {
    color:#00ffcc;
}

.actions {
    display:flex;
    justify-content:space-around;
    margin:20px 10px;
}

.actions button {
    background:#111827;
    border:none;
    padding:15px;
    border-radius:12px;
    color:white;
    width:22%;
    cursor:pointer;
}

.actions button:hover{
    background:#00ffcc;
    color:black;
}

input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    background:#111827;
    color:white;
}

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.menu {
    position:fixed;
    bottom:0;
    width:100%;
    background:#05080f;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}

.menu div{
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">SummitFX</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- DROPDOWN -->
<div class="dropdown" id="dropdownMenu">
    <div onclick="goTo('profile.html')">My Profile</div>
    <div onclick="goTo('edit-profile.html')">Edit Profile</div>
    <div onclick="goTo('withdraw.html')">Withdraw</div>
    <div onclick="goTo('deposit.html')">Deposit</div>
    <div onclick="goTo('kyc.html')">Verify KYC</div>
    <div onclick="logout()">Logout</div>
</div>

<!-- TICKER -->
<div class="ticker">
    <span id="prices">Loading prices...</span>
</div>

<!-- BALANCE -->
<div class="card">
    <div class="title">Account Balance</div>
    <div class="big" id="balance">$0</div>
</div>

<!-- PROFIT -->
<div class="card">
    <div class="title">All Time Profit</div>
    <div class="big green">+318%</div>
</div>

<!-- BOT -->
<div class="card">
    <div class="title">Trading Bot</div>

    <button class="btn" onclick="goTo('acquire-bot.html')">
        Activate Bot
    </button>
</div>

<!-- ACTIONS -->
<div class="actions">
    <button onclick="goTo('deposit.html')">Deposit</button>
    <button onclick="goTo('invest.html')">Invest</button>
    <button onclick="goTo('withdraw.html')">Withdraw</button>
    <button onclick="goTo('profile.html')">Profile</button>
</div>

<!-- PLANS -->
<div class="card">
<div class="title">Investment Plans</div>

<button class="btn" onclick="selectPlan(400,8000)">
$400 → $8000
</button>

<button class="btn" onclick="selectPlan(500,10000)">
$500 → $10000
</button>

<button class="btn" onclick="selectPlan(600,12000)">
$600 → $12000
</button>

<p id="planInfo"></p>

</div>

<!-- BOTTOM MENU -->
<div class="menu">

<!-- FIXED HOME BUTTON -->
<div onclick="goTo('home.html')">Home</div>

<div onclick="goTo('markets.html')">Markets</div>
<div onclick="goTo('wallet.html')">Wallet</div>
<div onclick="goTo('settings.html')">Settings</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

    if(user){

        const ref = doc(db, "users", user.uid);

        const snap = await getDoc(ref);

        if(snap.exists()){

            document.getElementById("balance").innerText =
            "$" + (snap.data().balance || 0);

        }else{

            await setDoc(ref,{
                balance:0
            });

        }

    }else{

        setTimeout(()=>{

            if(!auth.currentUser){

                window.location = "login.html";

            }

        },800);

    }

});

/* NAVIGATION */
window.goTo = (page)=>{
    window.location.href = page;
};

/* SELECT PLAN */
window.selectPlan = async (amount,profit)=>{

    const user = auth.currentUser;

    if(user){

        const ref = doc(db,"users",user.uid);

        await updateDoc(ref,{
            plan:{amount,profit}
        });

        document.getElementById("planInfo").innerText =
        `Selected: $${amount} → $${profit}`;

    }

};

/* LOGOUT */
window.logout = ()=>{

    signOut(auth)
    .then(()=>{

        window.location = "login.html";

    });

};

</script>

<script>

/* MENU */
function toggleMenu(){

    const menu =
    document.getElementById("dropdownMenu");

    menu.style.display =
    menu.style.display === "block"
    ? "none"
    : "block";

}

/* CLOSE MENU WHEN CLICKING OUTSIDE */
document.addEventListener("click", function(e){

    const menu =
    document.getElementById("dropdownMenu");

    const btn =
    document.querySelector(".menu-btn");

    if(
        !menu.contains(e.target)
        &&
        !btn.contains(e.target)
    ){

        menu.style.display = "none";

    }

});

/* LIVE PRICES */
async function loadPrices(){

try{

const response =
await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,tron&vs_currencies=usd"
);

const data = await response.json();

document.getElementById("prices").innerHTML =

`BTC $${data.bitcoin.usd}
&nbsp;&nbsp;&nbsp;
ETH $${data.ethereum.usd}
&nbsp;&nbsp;&nbsp;
USDT $${data.tether.usd}
&nbsp;&nbsp;&nbsp;
TRX $${data.tron.usd}`;

}catch(error){

document.getElementById("prices").innerText =
"Unable to load live prices";

}

}

loadPrices();

setInterval(loadPrices,10000);

</script>

</body>
</html>
