<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SummitFX Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.logo {
    font-size:20px;
    font-weight:bold;
    color:#00ffcc;
}

.menu-btn {
    cursor:pointer;
}

/* CARDS */
.card {
    background:#111827;
    margin:15px;
    padding:20px;
    border-radius:12px;
}

.big {
    font-size:26px;
}

.green {
    color:#00ffcc;
}

.actions {
    display:flex;
    justify-content:space-around;
    margin:20px;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
}

.btn {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#00ffcc;
    color:black;
}

/* MENU */
.menu {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#05080f;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SummitFX</div>
    <div onclick="logout()">Logout</div>
</div>

<div class="card">
    <div>Account Balance</div>
    <div class="big" id="balance">$0</div>
</div>

<div class="card">
    <div>All Time Profit</div>
    <div class="big green">+318%</div>
</div>

<div class="actions">
    <button onclick="goTo('deposit.html')">Deposit</button>
    <button onclick="goTo('withdraw.html')">Withdraw</button>
</div>

<div class="card">
<div>Investment Plans</div>

<button class="btn" onclick="selectPlan(400,8000)">$400 → $8000</button>
<button class="btn" onclick="selectPlan(500,10000)">$500 → $10000</button>
</div>

<div class="menu">
<div onclick="goTo('dashboard.html')">Home</div>
<div onclick="goTo('markets.html')">Markets</div>
<div onclick="goTo('wallet.html')">Wallet</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc, 
  setDoc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* ✅ SAME CONFIG AS LOGIN */
const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 FIXED AUTH CHECK */
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        if (snap.exists()) {
            document.getElementById("balance").innerText = "$" + snap.data().balance;
        } else {
            await setDoc(ref, { balance: 0 });
        }

    } else {
        setTimeout(() => {
            if (!auth.currentUser) {
                window.location = "login.html";
            }
        }, 800);
    }
});

/* NAV */
window.goTo = function(page){
    window.location.href = page;
}

/* PLAN */
window.selectPlan = async function(amount, profit){
    const user = auth.currentUser;
    if(user){
        const ref = doc(db, "users", user.uid);
        await updateDoc(ref, {
            plan: { amount, profit }
        });
        alert("Plan selected");
    }
}

/* LOGOUT */
window.logout = function(){
    signOut(auth).then(()=>{
        window.location = "login.html";
    });
}

</script>

</body>
</html>
