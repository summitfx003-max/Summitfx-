<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADDED FOR PWA -->
<meta name="theme-color" content="#05080f">

<!-- ADDED FOR PWA -->
<link rel="manifest" href="manifest.json">

<!-- FIX ADDED -->
<meta name="application-name" content="SummitFX">

<title>SummitFX Trading</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0f19;
    color:white;
}

/* MARKET */
.market-item {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111827;
    margin:5px;
}

.green {
    color:#00ff88;
}

/* CENTER */
.center {
    text-align:center;
    padding:20px;
}

.hero .big {
    font-size:28px;
    font-weight:bold;
}

.hero .desc {
    margin:10px 0;
    color:#aaa;
}

/* BUTTONS */
button {
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
}

.login {
    background:#1f2937;
    color:white;
}

.register {
    background:#f0b90b;
    color:black;
}

/* STATS */
.stats {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.stats div {
    background:#111827;
    padding:15px;
    border-radius:10px;
}

/* FEATURES */
.features {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:10px;
}

/* CHART */
.chart {
    margin-top:30px;
}
</style>

</head>

<body>

<!-- MARKET -->
<div class="market">

    <div class="market-item">
        <span>XAU/USD</span>
        <span class="green">$2,300</span>
    </div>

    <div class="market-item">
        <span>EUR/USD</span>
        <span class="green">1.09</span>
    </div>

    <div class="market-item">
        <span>USD/JPY</span>
        <span class="green">151.2</span>
    </div>

</div>

<!-- CENTER -->
<div class="center">

    <div class="hero">
        <div class="big">Trade Like a Pro With SummitFX</div>
        <div class="desc">
            AI-powered trading system with real-time market execution and analysis.
        </div>

        <button class="login" onclick="goLogin()">Sign In</button>
        <button class="register" onclick="goRegister()">Sign Up</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div>
            <h2>12K+</h2>
            <p>Users</p>
        </div>
        <div>
            <h2>$5M+</h2>
            <p>Volume</p>
        </div>
        <div>
            <h2>98%</h2>
            <p>Accuracy</p>
        </div>
    </div>

    <!-- FEATURES -->
    <div class="features">
        <div class="card">🤖 AI Bots</div>
        <div class="card">⚡ Fast Withdrawals</div>
        <div class="card">🔐 Secure System</div>
        <div class="card">📊 Live Charts</div>
    </div>

</div>

<!-- RIGHT CHART -->
<div class="chart">
    <h4 style="color:#00ffcc; text-align:center;">Live BTC Chart</h4>
    <div id="tradingview_chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    "width": "100%",
    "height": 350,
    "symbol": "BINANCE:BTCUSDT",
    "interval": "15",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "container_id": "tradingview_chart"
});
</script>

<!-- PRICE SIMULATION -->
<script>
setInterval(() => {
    document.querySelectorAll(".green").forEach(el=>{
        let base = parseFloat(el.innerText.replace("$","")) || 1000;
        let change = Math.floor(Math.random()*200-100);
        el.innerText = "$" + (base + change);
    });
}, 3000);
</script>

<!-- FIREBASE (FIXED PROPERLY FOR STABILITY) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, setPersistence, browserLocalPersistence } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
    authDomain: "summitfx-4cb86.firebaseapp.com",
    projectId: "summitfx-4cb86",
    storageBucket: "summitfx-4cb86.firebasestorage.app",
    messagingSenderId: "941382391446",
    appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 FIX: KEEP USER LOGGED IN PROPERLY */
setPersistence(auth, browserLocalPersistence)
.then(() => {
    console.log("🔥 Firebase persistence enabled");
})
.catch((error) => {
    console.log("Persistence error:", error);
});

/* NAVIGATION */
window.goLogin = function () {
    window.location.href = "login.html";
}

window.goRegister = function () {
    window.location.href = "register.html";
}

console.log("🔥 SummitFX Firebase Connected Safely");
</script>

<!-- ADDED FOR PWA -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
