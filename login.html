<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SummitFX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #111827;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #f0b90b;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

a {
  color: #f0b90b;
  text-decoration: none;
  display: block;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="loginUser()">Login</button>

  <a href="register.html">Create Account</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 FIX 1: KEEP USER LOGGED IN */
setPersistence(auth, browserLocalPersistence)
.then(() => {
  console.log("Auth persistence enabled");
})
.catch((error) => {
  console.log("Persistence error:", error);
});

/* LOGIN FUNCTION */
window.loginUser = function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Fill all fields");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {

      alert("✅ Login successful");

      /* 🔥 FIX 2: WAIT FOR SESSION STABILITY BEFORE REDIRECT */
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 500);

    })
    .catch((error) => {
      alert("❌ " + error.message);
    });
};

</script>

</body>
</html>
