<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container{
    padding:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Withdraw Funds</h2>

<input type="number" id="amount" placeholder="Enter amount">

<select id="method">
    <option value="">Select Method</option>
    <option value="usdt">USDT (TRC-20)</option>
    <option value="trx">TRON (TRX)</option>
</select>

<button class="btn" onclick="proceed()">Continue</button>

</div>

<script>

function proceed(){

    const amount = document.getElementById("amount").value;
    const method = document.getElementById("method").value;

    if(!amount || !method){
        alert("Please fill all fields");
        return;
    }

    // SAVE DATA TEMPORARILY
    localStorage.setItem("withdrawAmount", amount);
    localStorage.setItem("withdrawMethod", method);

    // REDIRECT ONLY (NO LOGIC HERE)
    window.location.href = "withdraw-process.html";
}

</script>

</body>
</html>
