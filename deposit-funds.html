<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Funds - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container{
    padding:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
}

.card{
    margin-top:20px;
    padding:15px;
    background:#111827;
    border-radius:10px;
}

.address{
    word-break:break-all;
    font-size:14px;
    color:#00ffcc;
}

img{
    width:150px;
    margin-top:10px;
}

/* WARNING BOX */
.note{
    margin-top:15px;
    padding:12px;
    background:#1f2937;
    border-left:4px solid #ffcc00;
    font-size:13px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h2>Deposit Funds</h2>

<label>Enter Amount</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Select Crypto</label>
<select id="crypto">
    <option value="">Choose</option>
    <option value="usdt">USDT (TRC-20)</option>
    <option value="trx">TRON (TRX)</option>
</select>

<div class="note">
⚠️ Important: Make sure you select the correct cryptocurrency before sending.  
Sending to the wrong network may result in permanent loss of funds.
</div>

<button class="btn" onclick="generateAddress()">Continue</button>

<div class="card" id="result" style="display:none;">

    <h3>Send Payment To:</h3>

    <div class="address" id="walletAddress"></div>

    <button class="btn" onclick="copyAddress()">Copy Address</button>

    <h4>Scan QR</h4>
    <img id="qr">

</div>

</div>

<!-- 🔥 FIREBASE ADDED -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* 🔥 CHECK USER */
onAuthStateChanged(auth,(user)=>{

    if(user){
        currentUser = user;
    }else{
        window.location = "login.html";
    }

});

/* WALLET ADDRESSES */
const wallets = {
    usdt: "TLEMJfnDaAqSoGWTG19WRMp2nco3qM6kDW",
    trx: "TADLKQobn7Nea5Zg8NiTQxGwJDP3AzgE9M"
};

window.generateAddress = async function(){

    const crypto = document.getElementById("crypto").value;
    const amount = document.getElementById("amount").value;

    if(!crypto || !amount){
        alert("Fill all fields");
        return;
    }

    const address = wallets[crypto];

    document.getElementById("walletAddress").innerText = address;

    document.getElementById("qr").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + address;

    document.getElementById("result").style.display = "block";

    /* 🔥 THIS FIXES ADMIN TRACKING */
    try{

        await addDoc(collection(db,"deposits"),{

            uid: currentUser.uid,
            userEmail: currentUser.email,

            amount: Number(amount),

            crypto: crypto,

            walletAddress: address,

            status: "pending",

            createdAt: Date.now()

        });

        console.log("Deposit saved");

    }catch(e){

        console.log(e);

    }

}

window.copyAddress = function(){

    const text = document.getElementById("walletAddress").innerText;

    navigator.clipboard.writeText(text);

    alert("Address copied");
}

</script>

</body>
</html>
