<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot System - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header{
    padding:15px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #1f2937;
}

.logo{
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
    font-size:20px;
    font-weight:bold;
}

.card{
    margin:15px;
    padding:20px;
    background:#111827;
    border-radius:15px;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
}

.status{
    margin-top:10px;
    color:#00ffcc;
}

.small{
    color:#aaa;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">SummitFX Bot</div>
</div>

<div class="card">
<h2>AI Trading Bot System</h2>
<p class="small">Automated trading engine (simulation system)</p>

<div id="status">Status: Loading...</div>

<button class="btn" onclick="activate('starter',100,24)">Starter Bot - $100</button>
<button class="btn" onclick="activate('pro',500,24)">Pro Bot - $500</button>
<button class="btn" onclick="activate('elite',2000,72)">Elite Bot - $2000</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let userData = null;

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
    if(!u){
        window.location="login.html";
        return;
    }

    user = u;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        await setDoc(ref,{
            balance:0,
            bot:{
                active:false
            }
        });
        userData = {balance:0};
    }else{
        userData = snap.data();
    }

    checkBotStatus();
});

/* CHECK BOT STATUS */
function checkBotStatus(){
    if(userData.bot?.active){
        document.getElementById("status").innerText =
        "Status: ACTIVE (" + userData.bot.level + ")";
    }else{
        document.getElementById("status").innerText =
        "Status: INACTIVE";
    }
}

/* ACTIVATE BOT */
window.activate = async function(level, cost, hours){

if(!user) return;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let data = snap.data();
let balance = Number(data.balance) || 0;

if(balance < cost){
alert("Insufficient balance");
return;
}

/* BOT OBJECT */
let botData = {
    active:true,
    level:level,
    startTime:Date.now(),
    durationHours:hours,
    profit:0,
    status:"active"
};

/* SAVE */
await updateDoc(ref,{
    balance: balance - cost,
    bot: botData
});

alert("Bot Activated: " + level.toUpperCase());
window.location="dashboard.html";

};

</script>

</body>
</html>
