<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Bot - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header{
    padding:15px;
    border-bottom:1px solid #1f2937;
    display:flex;
    justify-content:space-between;
}

.logo{
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.card{
    margin:20px;
    padding:25px;
    background:#111827;
    border-radius:15px;
    border:1px solid #1f2937;
    text-align:center;
}

.title{
    font-size:22px;
    margin-bottom:10px;
}

.text{
    color:#aaa;
    font-size:14px;
}

.btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    background:#0f766e;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">SummitFX Bot</div>
</div>

<div class="card">

<div class="title">AI Trading Bot System</div>

<div class="badge">100% Automated Execution</div>

<p class="text">
Choose from professional AI trading bots with different performance levels and durations.
</p>

<p class="text">
⚠️ Each bot requires activation capital before starting trading.
</p>

<button class="btn" onclick="goNext()">
Continue to Bot Selection
</button>

</div>

<script>
function goNext(){
    window.location.href = "bot-select.html";
}
</script>

</body>
</html>
