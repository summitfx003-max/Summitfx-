
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Bot - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #1f2937;
}

.logo{
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.card{
    margin:15px;
    padding:20px;
    background:#111827;
    border-radius:15px;
    border:1px solid #1f2937;
    text-align:center;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.status{
    color:#00ffcc;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">SummitFX Bot</div>
</div>

<div class="card">
<h2>AI Trading Bot</h2>
<p>Activate your automated trading system</p>

<button class="btn" id="activateBtn" onclick="activateBot()">
Activate Bot
</button>

<div class="status" id="status">Status: Inactive</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userData = null;
let currentUser = null;

/* WAIT FOR AUTH (FIXES RANDOM LOGOUT ISSUE) */
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location = "login.html";
        return;
    }

    currentUser = user;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        await setDoc(ref, {
            balance: 0,
            bot: false
        });
        userData = { balance: 0, bot: false };
    } else {
        userData = snap.data();
    }

    if (userData.bot === true) {
        document.getElementById("status").innerText = "Status: Active";
    }
});

/* BOT ACTIVATION */
window.activateBot = async function () {

if (!currentUser) return;

const btn = document.getElementById("activateBtn");
btn.disabled = true;
btn.innerText = "Activating...";

const ref = doc(db, "users", currentUser.uid);
const snap = await getDoc(ref);

let data = snap.data();
let balance = data.balance || 0;

/* FIX: SAFE BALANCE CHECK */
if (balance < 100) {
    alert("Minimum activation is $100");
    btn.disabled = false;
    btn.innerText = "Activate Bot";
    return;
}

/* UPDATE FIREBASE SAFELY */
await updateDoc(ref, {
    balance: balance - 100,
    bot: true,
    botStatus: "active",
    botPlan: "starter"
});

document.getElementById("status").innerText = "Status: Active";

alert("Bot Activated Successfully!");

setTimeout(()=>{
    window.location = "dashboard.html";
}, 1000);

};

</script>

</body>
</html>
