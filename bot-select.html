<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Bot</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header{
    padding:15px;
    border-bottom:1px solid #1f2937;
}

.logo{
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.container{
    padding:15px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    border:1px solid #1f2937;
}

.title{
    font-size:18px;
    color:#00ffcc;
}

.badge{
    background:#0f766e;
    padding:5px 10px;
    border-radius:10px;
    font-size:12px;
    display:inline-block;
    margin-top:5px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Choose Your Bot</div>
</div>

<div class="container">

<div class="card">
<div class="title">Starter Bot</div>
<div class="badge">80% Success Rate</div>
<p>Safe low-risk automated trading system.</p>
<button onclick="select('starter')">Select Starter</button>
</div>

<div class="card">
<div class="title">Pro Bot</div>
<div class="badge">90% Success Rate</div>
<p>Balanced risk-reward AI trading strategy.</p>
<button onclick="select('pro')">Select Pro</button>
</div>

<div class="card">
<div class="title">Elite Bot</div>
<div class="badge">95% Success Rate</div>
<p>High-performance institutional trading AI.</p>
<button onclick="select('elite')">Select Elite</button>
</div>

<div class="card">
<h3>Enter Investment Amount</h3>
<input type="number" id="amount" placeholder="Enter amount (USD)">
<button class="btn" onclick="activateBot()">Activate Bot</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let selectedBot = "starter";

/* AUTH */
onAuthStateChanged(auth,(u)=>{
    if(!u){
        window.location="login.html";
    }else{
        user = u;
    }
});

/* SELECT BOT */
window.select = function(type){
    selectedBot = type;
    alert(type.toUpperCase() + " selected");
};

/* ACTIVATE BOT (NO BALANCE RESTRICTION) */
window.activateBot = async function(){

let amount = document.getElementById("amount").value;

if(!amount){
alert("Enter amount");
return;
}

const ref = doc(db,"users",user.uid);

/* SIMPLE SAVE */
await updateDoc(ref,{
bot:{
    active:true,
    type:selectedBot,
    amount:Number(amount),
    startTime:Date.now()
}
});

alert("Bot Activated Successfully!");

window.location="dashboard.html";

};

</script>

</body>
</html>
