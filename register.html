<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SummitFX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #111827;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
  color: #00ffcc;
}

h2 {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #f0b90b;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

a {
  color: #f0b90b;
  text-decoration: none;
  display: block;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">

  <!-- ADDED -->
  <h1>SummitFX</h1>

  <h2>Create Account</h2>

  <!-- ADDED FULL NAME -->
  <input type="text" id="fullName" placeholder="Enter Full Name">

  <input type="email" id="email" placeholder="Enter Email">

  <input type="password" id="password" placeholder="Create Password">

  <!-- ADDED CONFIRM PASSWORD -->
  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button onclick="registerUser()">Register</button>

  <a href="login.html">Already have an account? Login</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.appspot.com",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* KEEP AUTH CONSISTENT */
setPersistence(auth, browserLocalPersistence)
.catch((error) => {
  console.log("Persistence error:", error);
});

/* REGISTER FUNCTION */
window.registerUser = async function () {

  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!fullName || !email || !password || !confirmPassword) {
    alert("Please fill all fields");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  try{

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;

    await sendEmailVerification(user);

    await setDoc(doc(db, "users", user.uid), {

      uid: user.uid,
      email: user.email,
      fullName: fullName,

      firstName: "",
      lastName: "",
      username: "",
      phone: "",
      location: "",
      address: "",

      balance: 0,
      kycStatus: "unverified",
      emailVerified: false,
      createdAt: Date.now(),
      status: "active"

    });

    alert("Account created successfully! Verification email sent.");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  }catch(error){
    alert("❌ " + error.message);
  }
};

</script>

</body>
</html>
