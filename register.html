  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SummitFX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #111827;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #f0b90b;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

a {
  color: #f0b90b;
  text-decoration: none;
  display: block;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <input type="email" id="email" placeholder="Enter Email">

  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="registerUser()">Register</button>

  <a href="login.html">Already have an account? Login</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence,

  /* 🔥 ADDED */
  sendEmailVerification

} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

/* 🔥 FIRESTORE */
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",

  /* 🔥 FIXED */
  storageBucket: "summitfx-4cb86.appspot.com",

  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* KEEP AUTH CONSISTENT */
setPersistence(auth, browserLocalPersistence)
.then(() => {
  console.log("Auth persistence enabled");
})
.catch((error) => {
  console.log("Persistence error:", error);
});

/* REGISTER FUNCTION */
window.registerUser = async function () {

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value;

  if (!email || !password) {

    alert("Please fill all fields");

    return;
  }

  try{

    /* CREATE ACCOUNT */
    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;

    /* 🔥 SEND EMAIL VERIFICATION */
    await sendEmailVerification(user);

    /* 🔥 SAVE USER */
    await setDoc(doc(db, "users", user.uid), {

      uid: user.uid,

      email: user.email,

      firstName: "",
      lastName: "",
      username: "",
      phone: "",
      location: "",
      address: "",

      balance: 0,

      kycStatus: "unverified",

      emailVerified: false,

      createdAt: Date.now(),

      status: "active"

    });

    alert(
      "✅ Account created successfully!\n\nVerification link sent to your email."
    );

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  }catch(error){

    alert("❌ " + error.message);

  }
};

</script>

</body>
</html>
