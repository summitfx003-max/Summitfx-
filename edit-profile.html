<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile - SummitFX</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header {
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title {
    font-size:20px;
    font-weight:bold;
    background: linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.card {
    margin:20px;
    padding:20px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.08);
}

.label {
    color:#aaa;
    font-size:13px;
}

input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    background:#111827;
    color:white;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

.avatar {
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:10px auto;
    border:2px solid #00ffcc;
}
</style>

</head>

<body>

<div class="header">
    <div class="title">Edit Profile</div>
    <button onclick="goBack()" style="background:none;border:none;color:white;">⬅ Back</button>
</div>

<div class="card">

    <img id="avatar" class="avatar" src="https://via.placeholder.com/100">

    <input type="file" id="photo">

    <div class="label">Email (cannot be changed here)</div>
    <input id="email" disabled>

    <div class="label">Display Name</div>
    <input id="name" placeholder="Enter your name">

    <button class="btn" onclick="updateProfile()">Save Changes</button>
</div>

<div class="card">
    <div class="label">Change Password</div>
    <input type="password" id="newPassword" placeholder="New password">
    <button class="btn" onclick="updatePassword()">Update Password</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* SAME CONFIG AS YOUR SYSTEM */
const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{
    if(user){
        currentUser = user;
        document.getElementById("email").value = user.email;

        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        if(snap.exists()){
            const data = snap.data();
            document.getElementById("name").value = data.name || "";
            if(data.photo){
                document.getElementById("avatar").src = data.photo;
            }
        }
    } else {
        window.location = "login.html";
    }
});

/* SAVE PROFILE */
window.updateProfile = async function(){

    const name = document.getElementById("name").value;
    const file = document.getElementById("photo").files[0];

    if(!name){
        alert("Enter your name");
        return;
    }

    let photoData = null;

    if(file){
        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onload = async function(){
            photoData = reader.result;

            await saveData(name, photoData);
        }
    } else {
        await saveData(name, null);
    }
};

async function saveData(name, photo){

    const ref = doc(db, "users", currentUser.uid);

    const data = { name };

    if(photo){
        data.photo = photo;
    }

    await setDoc(ref, data, { merge:true });

    alert("Profile updated");

    if(photo){
        document.getElementById("avatar").src = photo;
    }
}

/* UPDATE PASSWORD */
window.updatePassword = async function(){
    const newPass = document.getElementById("newPassword").value;

    if(!newPass){
        alert("Enter a password");
        return;
    }

    try{
        await updatePassword(auth.currentUser, newPass);
        alert("Password updated successfully");
    }catch(err){
        alert(err.message);
    }
};

/* BACK */
window.goBack = function(){
    window.location = "dashboard.html";
};

</script>

</body>
</html>
