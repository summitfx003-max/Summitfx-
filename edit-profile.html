<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{
    if(!user){
        window.location = "login.html";
        return;
    }

    currentUser = user;

    document.getElementById("email").value = user.email;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if(snap.exists()){
        const d = snap.data();

        firstName.value = d.firstName || "";
        lastName.value = d.lastName || "";
        username.value = d.username || "";
        phone.value = d.phone || "";
        dob.value = d.dob || "";
        gender.value = d.gender || "";
        bio.value = d.bio || "";
        location.value = d.location || "";
        address.value = d.address || "";

        if(d.photo) avatar.src = d.photo;
    }
});

/* SAVE PROFILE */
window.updateProfile = async function(){

    if(!currentUser){
        alert("User not ready");
        return;
    }

    const file = photo.files ? photo.files[0] : null;

    let data = {
        firstName: firstName.value,
        lastName: lastName.value,
        username: username.value,
        phone: phone.value,
        dob: dob.value,
        gender: gender.value,
        bio: bio.value,
        location: location.value,
        address: address.value
    };

    const saveToFirestore = async (finalData)=>{
        const ref = doc(db, "users", currentUser.uid);
        await setDoc(ref, finalData, { merge:true });
        alert("Profile updated successfully");
    };

    if(file){
        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onload = async ()=>{
            data.photo = reader.result;
            await saveToFirestore(data);
        };
    } else {
        await saveToFirestore(data);
    }
};

/* PASSWORD */
window.updatePassword = async function(){
    const newPass = document.getElementById("newPassword").value;

    if(!newPass){
        alert("Enter password");
        return;
    }

    try{
        await updatePassword(auth.currentUser, newPass);
        alert("Password updated");
    }catch(e){
        alert(e.message);
    }
};

window.goBack = ()=> window.location = "dashboard.html";

</script>
