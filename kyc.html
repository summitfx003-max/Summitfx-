<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Admin Panel - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header{
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.container{
    padding:15px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.btn{
    width:48%;
    padding:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.approve{
    background:#00ffcc;
    color:black;
}

.reject{
    background:#ff4d4d;
    color:white;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.label{
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">KYC Admin Panel</div>

<div class="container" id="list">
Loading KYC requests...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.firebasestorage.app",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

/* LOAD KYC REQUESTS */
async function loadKYC(){

    const snap = await getDocs(collection(db,"kyc"));

    list.innerHTML = "";

    snap.forEach(docSnap => {

        const d = docSnap.data();
        const id = docSnap.id;

        list.innerHTML += `
        <div class="card">

            <div class="label">Name</div>
            <div>${d.name}</div>

            <div class="label">Country</div>
            <div>${d.country}</div>

            <div class="label">ID Type</div>
            <div>${d.idType}</div>

            <div class="label">Status</div>
            <div>${d.status}</div>

            <img src="${d.idUrl}">
            ${d.selfieUrl ? `<img src="${d.selfieUrl}">` : ""}

            <div class="row">
                <button class="btn approve" onclick="approve('${id}')">Approve</button>
                <button class="btn reject" onclick="reject('${id}')">Reject</button>
            </div>

        </div>
        `;
    });
}

/* APPROVE */
window.approve = async function(id){
    await updateDoc(doc(db,"kyc",id),{
        status:"approved"
    });
    alert("Approved");
    loadKYC();
}

/* REJECT */
window.reject = async function(id){
    await updateDoc(doc(db,"kyc",id),{
        status:"rejected"
    });
    alert("Rejected");
    loadKYC();
}

loadKYC();

</script>

</body>
</html>
