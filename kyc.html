   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Verification - SummitFX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header{
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.container{
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.note{
    font-size:12px;
    color:#aaa;
    margin-top:10px;
}

img{
    width:100%;
    margin-top:10px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<div class="header">KYC Verification</div>

<div class="container">

<div class="card">

    <label>Full Name</label>
    <input id="name" placeholder="Enter full name">

    <label>Country</label>
    <select id="country">
        <option value="">Select Country</option>
        <option>Kenya</option>
        <option>United States</option>
        <option>United Kingdom</option>
        <option>India</option>
        <option>Nigeria</option>
        <option>South Africa</option>
    </select>

    <label>ID Type</label>
    <select id="idType">
        <option value="">Select ID Type</option>
        <option>National ID</option>
        <option>Passport</option>
        <option>Driver's License</option>
    </select>

</div>

<div class="card">

    <label>Upload ID Photo</label>
    <input type="file" id="idFile" accept="image/*">

    <label>Upload Selfie (holding ID optional)</label>
    <input type="file" id="selfieFile" accept="image/*">

    <div class="note">
        ⚠️ Ensure images are clear and readable. Blurry uploads may delay verification.
    </div>

</div>

<button class="btn" onclick="submitKYC()">Submit KYC</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXpqaWs6HgOsRRa7nAEsHJ74XWWXuvMQk",
  authDomain: "summitfx-4cb86.firebaseapp.com",
  projectId: "summitfx-4cb86",
  storageBucket: "summitfx-4cb86.appspot.com",
  messagingSenderId: "941382391446",
  appId: "1:941382391446:web:d9198bc79cf26bf82154b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let uid = null;

/* AUTH SAFE CHECK */
onAuthStateChanged(auth,(user)=>{
    if(user){
        uid = user.uid;
    } else {
        window.location = "login.html";
    }
});

/* SAFE UPLOAD */
async function upload(file,path){
    if(!file) return "";
    const storageRef = ref(storage,path);
    await uploadBytes(storageRef,file);
    return await getDownloadURL(storageRef);
}

/* SUBMIT KYC (FIXED) */
window.submitKYC = async function(){

    const name = document.getElementById("name").value;
    const country = document.getElementById("country").value;
    const idType = document.getElementById("idType").value;

    const idFile = document.getElementById("idFile").files[0];
    const selfieFile = document.getElementById("selfieFile").files[0];

    if(!uid){
        alert("User not ready");
        return;
    }

    if(!name || !country || !idType || !idFile){
        alert("Fill all required fields");
        return;
    }

    try{

        const idUrl = await upload(idFile,`kyc/${uid}/id.jpg`);
        const selfieUrl = await upload(selfieFile,`kyc/${uid}/selfie.jpg`);

        /* 🔥 IMPORTANT FIX: merge-safe admin tracking */
        await setDoc(doc(db,"kyc",uid),{

            uid,
            name,
            country,
            idType,
            idUrl,
            selfieUrl,
            status:"pending",
            createdAt:Date.now()

        });

        alert("KYC submitted successfully (Pending Verification)");
        window.location = "dashboard.html";

    }catch(err){
        alert("Upload failed: " + err.message);
    }
}

</script>

</body>
</html>
